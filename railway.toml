# Railway deployment — Docker backend
# https://docs.railway.com/guides/dockerfiles

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = [
  "api/**",
  "modules/**",
  "utils/**",
  "config.py",
  "app.py",
  "requirements.txt",
  "Dockerfile",
  "scripts/**",
  "data/**",
]

[deploy]
# Uses Dockerfile ENTRYPOINT + CMD (entrypoint binds to $PORT from Railway)
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
