# Local production-like stack
#   docker compose up --build
# API: http://localhost:8000/docs
services:
  api:
    build: .
    container_name: pdf-rag-api
    ports:
      - "${PORT:-8000}:8000"
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODELS: ${OPENROUTER_MODELS:-google/gemma-4-31b-it:free,google/gemma-4-26b-a4b-it:free,openai/gpt-oss-20b:free}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      AUTO_INGEST_ON_START: ${AUTO_INGEST_ON_START:-true}
      PORT: "8000"
      PERSIST_ROOT: /data
      DATA_DIR: /data/uploads
      STORAGE_DIR: /data/storage
      PRUNE_MISSING_ON_INGEST: "false"
    volumes:
      # Single volume root (same as Railway /data mount)
      - ./persist_data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s
    restart: unless-stopped
